syntax = "proto3";

package subscription;

option go_package = "subscriptionpb";
option java_multiple_files = true;

/* =============================
   SUBSCRIPTION SERVICE RPCs
   ============================= */

service SubscriptionService {
  rpc GetSubscription(GetSubscriptionRequest) returns (SubscriptionResponse);
  rpc CheckAccess(CheckAccessRequest) returns (CheckAccessResponse);
  rpc CreateCheckout(CreateCheckoutRequest) returns (CreateCheckoutResponse);
  rpc CancelSubscription(CancelSubscriptionRequest) returns (SubscriptionResponse);
  rpc RestoreSubscription(RestoreSubscriptionRequest) returns (SubscriptionResponse);
  rpc AdminSetSubscription(AdminSetSubscriptionRequest) returns (SubscriptionResponse);
  rpc AdminRemoveSubscription(AdminRemoveSubscriptionRequest) returns (AdminRemoveSubscriptionResponse);
  rpc GetSubscriptionStats(GetSubscriptionStatsRequest) returns (SubscriptionStatsResponse);
}


/* =============================
        SUBSCRIPTION STRUCT
   ============================= */

message Subscription {
  string id = 1;
  string user_id = 2;
  int32 sub_type = 3;
  bool free_trial = 4;
  string status = 5;
  string started_at = 6;
  string ended_at = 7;
  string grace_period_end = 8;
  string issued_by = 9;
  string created_at = 10;
  string updated_at = 11;
}


/* =============================
       GET SUBSCRIPTION
   ============================= */

message GetSubscriptionRequest {
  string access_token = 1;
}

message SubscriptionResponse {
  bool success = 1;
  Subscription subscription = 2;
}


/* =============================
        CHECK ACCESS
   ============================= */

message CheckAccessRequest {
  string user_id = 1;
  int32 required_level = 2;
}

message CheckAccessResponse {
  bool has_access = 1;
  int32 current_level = 2;
  string status = 3;
}


/* =============================
      CREATE CHECKOUT
   ============================= */

message CreateCheckoutRequest {
  string access_token = 1;
  int32 plan_type = 2;
  string payment_method = 3;
  int32 duration_months = 4;
}

message ProrationInfo {
  int32 remaining_days = 1;
  int32 remaining_value_cents = 2;
  int32 new_plan_price_cents = 3;
  int32 discount_cents = 4;
  int32 final_price_cents = 5;
}

message CreateCheckoutResponse {
  bool success = 1;
  string payment_url = 2;
  string order_id = 3;
  int32 expires_in = 4;
  ProrationInfo proration = 5;
}


/* =============================
     CANCEL SUBSCRIPTION
   ============================= */

message CancelSubscriptionRequest {
  string access_token = 1;
}


/* =============================
     RESTORE SUBSCRIPTION
   ============================= */

message RestoreSubscriptionRequest {
  string access_token = 1;
}


/* =============================
    ADMIN SET SUBSCRIPTION
   ============================= */

message AdminSetSubscriptionRequest {
  string access_token = 1;
  string user_id = 2;
  int32 sub_type = 3;
  int32 duration_months = 4;
  string issued_by = 5;
}


/* =============================
   ADMIN REMOVE SUBSCRIPTION
   ============================= */

message AdminRemoveSubscriptionRequest {
  string access_token = 1;
  string user_id = 2;
  string reason = 3;
}

message AdminRemoveSubscriptionResponse {
  bool success = 1;
  string message = 2;
}


/* =============================
    GET SUBSCRIPTION STATS
   ============================= */

message GetSubscriptionStatsRequest {
  string access_token = 1;
}

message TierCount {
  int32 tier = 1;
  int32 count = 2;
}

message SubscriptionStatsResponse {
  bool success = 1;
  int32 total_active = 2;
  int32 total_expired = 3;
  int32 total_canceled = 4;
  int32 total_terminated = 5;
  repeated TierCount by_tier = 6;
}
